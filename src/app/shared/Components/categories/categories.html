<nav class="categories-nav">  
  <div class="nav-links">
    <a *ngFor="let item of categoryList" 
       href="#" 
       class="nav-item"
       [class.active]="activeItem === item.name"
       (click)="setActive(item.name, $event)">
       
      <i [class]="item.icon"></i> {{ item.displayName }}
    </a>
  </div>
</nav>
